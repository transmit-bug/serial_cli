name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Phase 1: Quick checks that should run first
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libluajit-5.1-dev

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run Clippy (deny all warnings)
        run: cargo clippy -- -D warnings

      - name: Validate justfile
        uses: taiki-e/install-action@just
      - run: just --list

  # Phase 1b: Frontend tests (fast, jsdom-based)
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --force

      - name: Run Vitest
        working-directory: frontend
        run: npm run test

      - name: Type check
        working-directory: frontend
        run: npm run type-check

  # Phase 2: Unit tests (fast, no external dependencies)
  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libluajit-5.1-dev

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install luajit

      - name: Use vendored LuaJIT (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "LUAJIT_NO_PKG_CONFIG=1" >> $env:GITHUB_ENV
          echo "MLUA_LUAJIT_SYS=1" >> $env:GITHUB_ENV

      - name: Run unit tests
        run: cargo test --lib --all-features

      - name: Run documentation tests (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --doc

  # Phase 3: Integration tests (heavier, may need special setup)
  integration-tests:
    name: Integration Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libluajit-5.1-dev

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install luajit

      - name: Run integration tests
        run: cargo test --test '*' --all-features -- --skip e2e_

      - name: Run E2E tests (macOS only, allow failure initially)
        if: matrix.os == 'macos-latest'
        continue-on-error: true
        run: cargo test --test e2e_server_tests --all-features -- --ignored

  # Phase 4: Documentation build verification
  doc-build:
    name: Documentation Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libluajit-5.1-dev

      - name: Build documentation
        run: cargo doc --no-deps --all-features 2>&1 | tee /tmp/doc_output.txt
      - name: Check for documentation errors
        run: |
          grep -i "broken\|error" /tmp/doc_output.txt || echo "No documentation errors found"

  # Summary job for required status check
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [quality, frontend-tests, unit-tests, integration-tests, doc-build]
    if: always()

    steps:
      - name: Check overall status
        run: |
          if [[ "${{ needs.quality.result }}" == "success" && \
                "${{ needs.frontend-tests.result }}" == "success" && \
                "${{ needs.unit-tests.result }}" == "success" && \
                "${{ needs.integration-tests.result }}" == "success" && \
                "${{ needs.doc-build.result }}" == "success" ]]; then
            echo "✅ All CI checks passed"
            exit 0
          else
            echo "❌ Some CI checks failed"
            echo "Quality: ${{ needs.quality.result }}"
            echo "Frontend tests: ${{ needs.frontend-tests.result }}"
            echo "Unit tests: ${{ needs.unit-tests.result }}"
            echo "Integration tests: ${{ needs.integration-tests.result }}"
            echo "Doc build: ${{ needs.doc-build.result }}"
            exit 1
          fi
