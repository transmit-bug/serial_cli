# 配置文件

[advisories]
# 数据库路径
db-path = "~/.cargo/advisory-db"
# 数据库URL
db-urls = ["https://github.com/rustsec/advisory-db"]

[licenses]
# 许可证策略
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
]
private = { ignore = true }

# 需要澄清的许可证
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[[licenses.exceptions]]
allow = ["ISC", "OpenSSL"]
name = "ring"

[bans]
# 多版本检查
multiple-versions = "warn"
# 通配符依赖
wildcards = "allow"
# 高亮所有显示
highlight = "all"

# Skip-tree for known duplicate packages that are safe to ignore
[[bans.skip-tree]]
name = "windows-sys"

[sources]
# 未知注册表
unknown-registry = "warn"
# 未知git源
unknown-git = "warn"
# 允许的注册表
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# 允许的git源
allow-git = []
